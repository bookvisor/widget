<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>물마시기</title>

<style>
body {
  margin: 0;
  background: transparent;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

/* 카드 */
.card {
  width: 100%;
  max-width: 400px;
  margin: 0 auto;
  padding: 15px;
  /*border-radius: 10px;
  border: 1px solid rgba(200, 200, 200, 0.6);*/
  text-align: center;
  position: relative;
  backdrop-filter: blur(10px);
}

/* 테마 */
@media (prefers-color-scheme: light) {
  .card {
    background: rgba(0,0,0,0.05);
    color: #2563eb;
  }
}
@media (prefers-color-scheme: dark) {
  .card {
    background: rgba(255,255,255,0.08);
    color: #60a5fa;
  }
}

/* 제목 */
.title {
  font-size: 14px;
  font-weight: bold;
  opacity: 0.9;
}

.level {
  font-size: 12px;
  margin-top: 5px;
}

/* 목표 */
.goal-wrap {
  margin: 10px 0;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 5px;
}

.goal-label {
  color: gray;
  font-size: 14px;
}

/* input */
input {
  width: 55px;
  border: none;
  border-radius: 8px;
  padding: 3px;
  text-align: center;
  font-size: 14px;
}

/* spinner 유지 */
input::-webkit-outer-spin-button,
input::-webkit-inner-spin-button {
  opacity: 1;
}

/* 컵 */
.cup {
  width: 60px;
  height: 80px;
  margin: 10px auto;
  border-radius: 10px;
  overflow: hidden;
  background: rgba(0,0,0,0.1);
  position: relative;
}

/* 물 */
.water {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 0%;
  background: linear-gradient(#38bdf8, #3b82f6);
  transition: height 0.5s ease;
}

/* wave */
.wave {
  position: absolute;
  width: 200%;
  height: 100%;
  top: -10px;
  left: -50%;
  background: rgba(255,255,255,0.4);
  opacity: 0.4;
  border-radius: 40%;
  animation: wave 3s infinite linear;
}

@keyframes wave {
  to { transform: translateX(-50%) rotate(360deg); }
}

.count {
  font-size: 20px;
  margin: 5px;
}

/* ✅ 버튼 한 줄 정렬 */
.btns {
  display: flex;
  justify-content: center;
  gap: 8px;
}

/* 버튼 스타일 */
.btns button {
  border: none;
  border-radius: 10px;
  height: 40px;
  min-width: 80px;
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ml 텍스트 */
.ml {
  font-size: 10px;
  opacity: 0.7;
  margin-left: 3px;
}

@media (prefers-color-scheme: light) {
  .btns button {
    background: rgba(37, 99, 235, 0.1);
    color: #2563eb;
  }
}
@media (prefers-color-scheme: dark) {
  .btns button {
    background: rgba(96,165,250,0.2);
    color: #60a5fa;
  }
}

/* 폭죽 */
.confetti {
  position: absolute;
  width: 5px;
  height: 5px;
  top: 50%;
  left: 50%;
  animation: explode 1s ease-out forwards;
}

@keyframes explode {
  to {
    transform: translate(var(--x), var(--y));
    opacity: 0;
  }
}
</style>
</head>

<body>

<div class="card" id="card">
  <div class="title">💧 물마시기</div>
  <div class="level" id="level">Lv.1 초보 수분러</div>

  <div class="goal-wrap">
    <span class="goal-label">목표</span>
    <input id="goal" type="number" min="1">
  </div>

  <div class="cup">
    <div class="water" id="water">
      <div class="wave"></div>
    </div>
  </div>

  <div class="count" id="count">0 / 8</div>

  <div class="btns">
    <button onclick="add()">
      +1잔 <span class="ml">(250ml)</span>
    </button>
    <button onclick="reset()">↺</button>
  </div>
</div>

<script>
// 저장 키
const COUNT_KEY = "water_count";
const GOAL_KEY = "water_goal";
const DATE_KEY = "water_date";
const LEVEL_KEY = "water_level";

// 날짜 초기화
const today = new Date().toLocaleDateString();
if (localStorage.getItem(DATE_KEY) !== today) {
  localStorage.setItem(DATE_KEY, today);
  localStorage.setItem(COUNT_KEY, 0);
}

// 데이터
let count = Number(localStorage.getItem(COUNT_KEY)) || 0;
let goal = Number(localStorage.getItem(GOAL_KEY)) || 8;
let level = Number(localStorage.getItem(LEVEL_KEY)) || 1;

document.getElementById("goal").value = goal;

// ✅ 효과음
function playSound() {
  const audio = new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg");
  audio.play();
}

// 레벨 이름
function getLevelName(lv) {
  if (lv < 3) return "초보 수분러";
  if (lv < 5) return "꾸준한 수분러";
  if (lv < 10) return "프로 수분러";
  return "수분 마스터 👑";
}

// 폭죽
function confetti() {
  const card = document.getElementById("card");
  for (let i = 0; i < 20; i++) {
    let c = document.createElement("div");
    c.className = "confetti";
    c.style.setProperty("--x", (Math.random()*200-100)+"px");
    c.style.setProperty("--y", (Math.random()*200-100)+"px");
    c.style.background = `hsl(${Math.random()*360},100%,50%)`;
    card.appendChild(c);
    setTimeout(() => c.remove(), 1000);
  }
}

// 기능
function add() {
  count++;

  if (count >= goal) {
    count = goal;
    level++;
    playSound();
    confetti();
  }

  save();
  update();
}

function reset() {
  count = 0;
  save();
  update();
}

// 저장
function save() {
  localStorage.setItem(COUNT_KEY, count);
  localStorage.setItem(GOAL_KEY, document.getElementById("goal").value);
  localStorage.setItem(LEVEL_KEY, level);
}

// 업데이트
function update() {
  goal = Number(document.getElementById("goal").value);

  document.getElementById("count").innerText = count + " / " + goal;
  document.getElementById("level").innerText =
    "Lv." + level + " " + getLevelName(level);

  let percent = Math.min((count / goal) * 100, 100);
  document.getElementById("water").style.height = percent + "%";
}

document.getElementById("goal").addEventListener("input", save);

update();
</script>

</body>
</html>
