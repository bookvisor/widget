<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Water Widget</title>

<style>
body {
  margin: 0;
  background: transparent;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

/* ✅ 기본 (라이트 모드) */
.card {
  width: 180px;
  padding: 15px;
  border-radius: 20px;
  background: rgba(0,0,0,0.05);
  backdrop-filter: blur(12px);
  color: #222;
  text-align: center;
}

/* ✅ 다크 모드 자동 적용 */
@media (prefers-color-scheme: dark) {
  .card {
    background: rgba(255,255,255,0.08);
    color: white;
  }
}

.title {
  font-size: 13px;
  opacity: 0.7;
}

.count {
  font-size: 24px;
  margin: 8px 0;
  font-weight: bold;
}

input {
  width: 50px;
  border: none;
  border-radius: 8px;
  padding: 3px;
  text-align: center;
  margin-bottom: 8px;
}

/* ✅ 버튼 기본 */
.btns button {
  border: none;
  border-radius: 8px;
  padding: 6px 8px;
  margin: 3px;
  cursor: pointer;
  font-size: 12px;
  background: rgba(0,0,0,0.1);
  color: inherit;
}

/* ✅ 버튼 다크 */
@media (prefers-color-scheme: dark) {
  .btns button {
    background: rgba(255,255,255,0.2);
    color: white;
  }
}

.bar {
  height: 6px;
  background: rgba(0,0,0,0.1);
  border-radius: 10px;
  margin-top: 8px;
  overflow: hidden;
}

/* ✅ 바 다크 */
@media (prefers-color-scheme: dark) {
  .bar {
    background: rgba(255,255,255,0.15);
  }
}

.fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #38bdf8, #3b82f6);
  transition: 0.3s;
}
</style>
</head>

<body>

<div class="card">
  <div class="title">💧 Water</div>
  <div class="count" id="count">0 / 8</div>

  목표 <input id="goal" type="number" min="1">

  <div class="btns">
    <button onclick="add()">+1</button>
    <button onclick="reset()">↺</button>
  </div>

  <div class="bar">
    <div class="fill" id="fill"></div>
  </div>
</div>

<script>
// ✅ 저장 키
const COUNT_KEY = "water_count";
const GOAL_KEY = "water_goal";
const DATE_KEY = "water_date";

// ✅ 오늘 날짜 확인 (자동 초기화)
const today = new Date().toLocaleDateString();
const savedDate = localStorage.getItem(DATE_KEY);

if (savedDate !== today) {
  localStorage.setItem(DATE_KEY, today);
  localStorage.setItem(COUNT_KEY, 0);
}

// ✅ 데이터 불러오기
let count = Number(localStorage.getItem(COUNT_KEY)) || 0;
let goal = Number(localStorage.getItem(GOAL_KEY)) || 8;

document.getElementById("goal").value = goal;

// ✅ 버튼 기능
function add() {
  count++;
  save();
  update();
}

function reset() {
  count = 0;
  save();
  update();
}

// ✅ 저장
function save() {
  localStorage.setItem(COUNT_KEY, count);
  localStorage.setItem(GOAL_KEY, document.getElementById("goal").value);
}

// ✅ 화면 업데이트
function update() {
  goal = Number(document.getElementById("goal").value);
  document.getElementById("count").innerText = count + " / " + goal;

  let percent = Math.min((count / goal) * 100, 100);
  document.getElementById("fill").style.width = percent + "%";
}

// 목표 변경 저장
document.getElementById("goal").addEventListener("input", save);

// 초기 실행
update();
</script>

</body>
</html>
