<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>물마시기</title>

<style>
body {
  margin: 0;
  background: transparent;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  color: #38bdf8;
}

/* 카드 */
.card {
  width: 100%;
  max-width: 400px;
  margin: 0 auto;
  padding: 15px;
  text-align: center;
  backdrop-filter: blur(10px);
  position: relative;
}

/* 제목 */
.title {
  font-size: 14px;
  font-weight: bold;
}

.level {
  font-size: 12px;
  margin-top: 5px;
}

/* 목표 */
.goal-wrap {
  margin: 10px 0;
  display: flex;
  justify-content: center;
  gap: 5px;
}

.goal-label {
  font-size: 14px;
  color: gray;
}

/* input */
input {
  width: 55px;
  border-radius: 8px;
  border: none;
  text-align: center;
  font-size: 14px;
  color: gray;
  font-weight: bold;
}

/* spinner */
input::-webkit-outer-spin-button,
input::-webkit-inner-spin-button {
  opacity: 1;
}

/* 컵 */
.cup {
  width: 70px;
  height: 110px;
  margin: 10px auto;
  border-radius: 25px 25px 15px 15px;
  overflow: hidden;
  background: rgba(0,0,0,0.1);
  position: relative;
}

/* 물 */
.water {
  position: absolute;
  bottom: 0;
  width: 200%;
  left: -50%;
  height: 0%;
  background: linear-gradient(#38bdf8, #2563eb);
  overflow: hidden;
  transition: height 0.5s ease;
}

/* wave */
.wave {
  position: absolute;
  width: 200%;
  height: 200%;
  top: -50%;
  left: -50%;
  border-radius: 45%;
}

.w1 {
  background: rgba(255,255,255,0.35);
  animation: waveA 3s linear infinite;
}
.w2 {
  background: rgba(255,255,255,0.25);
  animation: waveB 5s linear infinite;
}
.w3 {
  background: rgba(255,255,255,0.15);
  animation: waveC 7s linear infinite;
}

@keyframes waveA {
  to { transform: translateX(-50%) rotate(360deg); }
}
@keyframes waveB {
  to { transform: translateX(-50%) rotate(-360deg); }
}
@keyframes waveC {
  to { transform: translateX(-50%) rotate(360deg); }
}

/* 카운트 */
.count {
  font-size: 20px;
  font-weight: bold;
}

/* 버튼 */
.btns {
  display: flex;
  justify-content: center;
  gap: 8px;
}

.btns button {
  border: none;
  border-radius: 10px;
  height: 40px;
  min-width: 90px;
  font-size: 15px;
  cursor: pointer;
  background: rgba(56,189,248,0.1);
  color: #38bdf8;
}

.ml {
  font-size: 10px;
}

/* 🎉 폭죽 */
.confetti {
  position: absolute;
  width: 6px;
  height: 6px;
  top: 50%;
  left: 50%;
  animation: explode 1s ease-out forwards;
}

@keyframes explode {
  to {
    transform: translate(var(--x), var(--y));
    opacity: 0;
  }
}
</style>
</head>

<body>

<div class="card" id="card">
  <div class="title">💧 물마시기</div>
  <div class="level" id="level">Lv.1 초보 수분러</div>

  <div class="goal-wrap">
    <span class="goal-label">목표</span>
    <input id="goal" type="number" min="1">
  </div>

  <div class="cup">
    <div class="water" id="water">
      <div class="wave w1"></div>
      <div class="wave w2"></div>
      <div class="wave w3"></div>
    </div>
  </div>

  <div class="count" id="count">0 / 8</div>

  <div class="btns">
    <button onclick="add()">+1잔 <span class="ml">(250ml)</span></button>
    <button onclick="reset()">↺</button>
  </div>
</div>

<script>
let count = 0;
let goal = 8;
let level = 1;

const goalInput = document.getElementById("goal");
goalInput.value = goal;

/* ✅ 효과음 */
function playSound() {
  const audio = new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg");
  audio.play();
}

/* ✅ 폭죽 */
function confetti() {
  const card = document.getElementById("card");

  for (let i = 0; i < 20; i++) {
    let c = document.createElement("div");
    c.className = "confetti";

    c.style.setProperty("--x", (Math.random()*200 - 100) + "px");
    c.style.setProperty("--y", (Math.random()*200 - 100) + "px");
    c.style.background = `hsl(${Math.random()*360},100%,50%)`;

    card.appendChild(c);
    setTimeout(() => c.remove(), 1000);
  }
}

function getLevelName(lv) {
  if (lv < 3) return "초보 수분러";
  if (lv < 5) return "꾸준한 수분러";
  if (lv < 10) return "프로 수분러";
  return "수분 마스터";
}

function add() {
  count++;

  if (count >= goal) {
    count = goal;
    level++;
    playSound();   // ✅ 효과음
    confetti();    // ✅ 폭죽
  }

  update();
}

function reset() {
  count = 0;
  update();
}

function update() {
  goal = Number(goalInput.value);

  document.getElementById("count").innerText =
    count + " / " + goal;

  document.getElementById("level").innerText =
    "Lv." + level + " " + getLevelName(level);

  document.getElementById("water").style.height =
    (count / goal * 100) + "%";
}

goalInput.addEventListener("input", update);
update();
</script>

</body>
</html>
