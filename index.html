<style>
body {
  margin: 0;
  background: transparent;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

/* ✅ 기본 (라이트 모드) */
.card {
  width: 180px;
  padding: 15px;
  border-radius: 20px;
  background: rgba(0,0,0,0.05);
  backdrop-filter: blur(12px);
  color: #222;
  text-align: center;
}

/* ✅ 다크 모드 자동 적용 */
@media (prefers-color-scheme: dark) {
  .card {
    background: rgba(255,255,255,0.08);
    color: white;
  }
}

.title {
  font-size: 13px;
  opacity: 0.7;
}

.count {
  font-size: 24px;
  margin: 8px 0;
  font-weight: bold;
}

input {
  width: 50px;
  border: none;
  border-radius: 8px;
  padding: 3px;
  text-align: center;
  margin-bottom: 8px;
}

.btns button {
  border: none;
  border-radius: 8px;
  padding: 6px 8px;
  margin: 3px;
  cursor: pointer;
  font-size: 12px;
  background: rgba(0,0,0,0.1);
  color: inherit;
}

/* 다크모드 버튼 */
@media (prefers-color-scheme: dark) {
  .btns button {
    background: rgba(255,255,255,0.2);
    color: white;
  }
}

.bar {
  height: 6px;
  background: rgba(0,0,0,0.1);
  border-radius: 10px;
  margin-top: 8px;
  overflow: hidden;
}

/* 다크모드 바 */
@media (prefers-color-scheme: dark) {
  .bar {
    background: rgba(255,255,255,0.15);
  }
}

.fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #38bdf8, #3b82f6);
  transition: 0.3s;
}
</style>
